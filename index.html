    <style>
        /* --- PREMIUM DARK UI --- */
        :root {
            --bg-base: #0A0A0C;
            --bg-sidebar: #131316;
            --bg-card: #1A1A1F;
            --accent: #E50914; 
            --text-main: #FFFFFF;
            --text-muted: #88888D;
            --font-main: 'Poppins', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }
        body { background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; display: flex; }
        a { text-decoration: none; color: inherit; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* --- SIDEBAR --- */
        .sidebar { width: 260px; background-color: var(--bg-sidebar); padding: 30px 20px; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.02); position: fixed; height: 100vh; top: 0; left: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 800; color: var(--text-main); margin-bottom: 50px; display: flex; align-items: center; gap: 12px; }
        .logo i { color: var(--accent); font-size: 28px; }
        .nav-menu { list-style: none; }
        .nav-menu li { margin-bottom: 15px; }
        .nav-menu a { display: flex; align-items: center; gap: 15px; font-weight: 600; color: var(--text-muted); transition: 0.3s; padding: 12px 15px; border-radius: 12px; }
        .nav-menu a:hover, .nav-menu a.active { color: var(--text-main); background: rgba(229, 9, 20, 0.1); }
        .nav-menu a.active i { color: var(--accent); }

        /* --- MAIN CONTENT --- */
        .main-content { margin-left: 260px; width: calc(100% - 260px); min-height: 100vh; padding-bottom: 50px; }
        
        /* Topbar */
        .topbar { display: flex; justify-content: space-between; align-items: center; padding: 25px 40px; position: sticky; top: 0; z-index: 100; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .search-box { display: flex; align-items: center; width: 100%; max-width: 500px; background: var(--bg-sidebar); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; overflow: hidden; transition: 0.3s; }
        .search-box:focus-within { border-color: var(--accent); box-shadow: 0 0 15px rgba(229, 9, 20, 0.2); }
        .search-box input { flex: 1; background: transparent; border: none; padding: 12px 20px; color: white; font-size: 15px; outline: none; }
        .search-box button { background: var(--accent); color: white; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .search-box button:hover { background: #ff1f2a; }

        .profile { display: flex; align-items: center; gap: 15px; font-weight: 600; }
        .profile img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }

        /* --- HERO BANNER --- */
        .hero-container { padding: 30px 40px; }
        .hero { position: relative; width: 100%; height: 450px; border-radius: 20px; overflow: hidden; display: flex; align-items: flex-end; padding: 50px; background: #111; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        .hero-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.5; transition: 0.5s; }
        .hero-gradient { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, var(--bg-base) 0%, transparent 100%); z-index: 2; }
        .hero-content { position: relative; z-index: 3; max-width: 700px; }
        .hero-meta { display: inline-block; background: rgba(229, 9, 20, 0.2); color: var(--accent); padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 800; letter-spacing: 1px; margin-bottom: 20px; }
        .hero-title { font-size: 3rem; font-weight: 800; line-height: 1.2; margin-bottom: 25px; text-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .btn-watch { background: var(--accent); color: white; padding: 14px 35px; border-radius: 30px; font-weight: 600; display: inline-flex; align-items: center; gap: 10px; cursor: pointer; border: none; transition: 0.3s; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-watch:hover { background: #ff1f2a; transform: translateY(-3px); box-shadow: 0 10px 25px rgba(229, 9, 20, 0.4); }

        /* --- MOVIE GRID --- */
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; margin-bottom: 25px; }
        .section-header h2 { font-size: 1.5rem; font-weight: 600; border-left: 4px solid var(--accent); padding-left: 10px; }
        .sync-btn { color: var(--text-muted); font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; background: var(--bg-card); padding: 8px 15px; border-radius: 20px; }
        .sync-btn:hover { color: var(--text-main); background: #333; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 0 40px; }
        .movie-card { background: var(--bg-card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; text-decoration: none; display: block; position: relative; border: 1px solid rgba(255,255,255,0.02); }
        .movie-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.6); border-color: rgba(229, 9, 20, 0.3); }
        
        .card-img-wrapper { position: relative; width: 100%; height: 280px; overflow: hidden; background: #111; }
        .movie-poster { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .movie-card:hover .movie-poster { transform: scale(1.08); opacity: 0.4; }
        
        .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); opacity: 0; color: white; font-size: 40px; transition: 0.3s; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .movie-card:hover .play-overlay { opacity: 1; transform: translate(-50%, -50%) scale(1); color: var(--accent); }
        
        .movie-info { padding: 15px; }
        .movie-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; color: var(--text-main); }
        .movie-meta { display: flex; justify-content: space-between; color: var(--text-muted); font-size: 12px; font-weight: 600; }

        /* Redirect Box (For missing movies & end of list) */
        .redirect-box { grid-column: 1 / -1; background: var(--bg-card); border: 2px dashed var(--text-muted); border-radius: 16px; padding: 40px; text-align: center; margin-top: 20px; }
        .redirect-box h3 { font-size: 1.5rem; margin-bottom: 10px; color: var(--text-main); }
        .redirect-box p { color: var(--text-muted); margin-bottom: 20px; font-size: 14px; }
        .btn-redirect { background: var(--text-main); color: var(--bg-base); padding: 12px 30px; border-radius: 30px; font-weight: 800; font-size: 15px; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; }
        .btn-redirect:hover { background: var(--accent); color: white; }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; width: 100%; }
            .hero { height: 350px; padding: 30px; }
            .hero-title { font-size: 2.2rem; }
            .topbar, .hero-container, .section-header, .grid-container { padding-left: 15px; padding-right: 15px; }
            .search-box input { padding-left: 15px; }
            .search-box button { padding: 0 15px; }
        }
    </style>

        // RENDER GRID ENGINE
        function renderGrid(moviesList, isSearch = false, searchTerm = "") {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = ""; 
            
            // Hero Banner Setup
            if(moviesList.length > 0) {
                const heroMovie = moviesList[0];
                document.getElementById('hero-img').src = heroMovie.img;
                document.getElementById('hero-title').innerText = heroMovie.title;
                document.getElementById('hero-genre').innerHTML = `<i class="fas fa-star"></i> #${isSearch ? '1 RESULT' : '1 RATED'}`;
                document.getElementById('hero-link').href = `https://waploaded.com/search?q=${encodeURIComponent(heroMovie.title)}`;

                moviesList.forEach((movie, index) => {
                    if(index === 0 && !isSearch) return; // Skip #1 on homepage so it doesn't duplicate

                    const card = document.createElement('a');
                    card.href = `https://waploaded.com/search?q=${encodeURIComponent(movie.title)}`;
                    card.target = "_blank";
                    card.className = "movie-card";

                    // Fallback logic inside image to never break
                    card.innerHTML = `
                        <div class="card-img-wrapper">
                            <img src="${movie.img}" class="movie-poster" onerror="this.onerror=null; this.src='https://via.placeholder.com/600x900/1A1A1F/E50914?text=${encodeURIComponent(movie.title)}'">
                            <i class="fas fa-download play-overlay"></i>
                        </div>
                        <div class="movie-info">
                            <div class="movie-name">${movie.title}</div>
                            <div class="movie-meta">
                                <span>${movie.year}</span>
                                <span style="color: var(--accent);"><i class="fas fa-tag"></i> ${movie.type}</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            // REDIRECT BOX (Always appended at the bottom)
            const redirectBox = document.createElement('div');
            redirectBox.className = "redirect-box";
            
            if(isSearch) {
                redirectBox.innerHTML = `
                    <h3>Movie not in the Top 100?</h3>
                    <p>Waploaded has 50,000+ movies on their main database.</p>
                    <a href="https://waploaded.com/search?q=${encodeURIComponent(searchTerm)}" target="_blank" class="btn-redirect">
                        <i class="fas fa-search"></i> Search Waploaded directly for "${searchTerm}"
                    </a>
                `;
            } else {
                redirectBox.innerHTML = `
                    <h3>Want to explore more movies?</h3>
                    <p>View the full library directly on Waploaded's main servers.</p>
                    <a href="https://waploaded.com/movies" target="_blank" class="btn-redirect">
                        <i class="fas fa-external-link-alt"></i> Browse All Waploaded Movies
                    </a>
                `;
            }
            grid.appendChild(redirectBox);
        }

        // SEARCH ENGINE (Filters locally instantly)
        function executeSearch(event) {
            event.preventDefault();
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            if (!query) return;

            document.getElementById('grid-title').innerHTML = `Search Results: <span style="color:var(--accent);">${query}</span>`;
            
            // Filter the Top 100 list locally
            const filteredMovies = top100Data.filter(movie => movie.title.toLowerCase().includes(query));

            if (filteredMovies.length > 0) {
                renderGrid(filteredMovies, true, query);
            } else {
                // If it's not in the Top 100, immediately offer the Waploaded Redirect Box
                const grid = document.getElementById('movie-grid');
                grid.innerHTML = `
                    <div class="redirect-box" style="padding: 60px 20px;">
                        <i class="fas fa-search" style="font-size: 50px; color: var(--accent); margin-bottom: 20px;"></i>
                        <h3>"${query}" is not in our Top 100 List</h3>
                        <p>However, it is likely available on Waploaded's main servers!</p>
                        <br>
                        <a href="https://waploaded.com/search?q=${encodeURIComponent(query)}" target="_blank" class="btn-redirect">
                            <i class="fas fa-download"></i> Search Waploaded for "${query}"
                        </a>
                    </div>
                `;
            }
            
            document.getElementById('grid-title').scrollIntoView({ behavior: 'smooth' });
        }

        // LOAD HOME PAGE
        function loadCatalog() {
            document.getElementById('search-input').value = "";
            document.getElementById('grid-title').innerText = "IMDb Top 100 Catalog";
            renderGrid(top100Data);
        }

        // Run instantly on load
        window.onload = loadCatalog;
    </script>
